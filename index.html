<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Security Portal - PTBA</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            border: 2px solid #39ff14; 
            padding: 30px; 
            border-radius: 10px; 
            width: 350px; 
            text-align: center;
            box-shadow: 0 0 15px #39ff14;
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 15px 0; 
            background: #000; 
            border: 1px solid #39ff14; 
            color: #39ff14; 
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background: #39ff14; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #2ecc71; }
        #message { margin-top: 20px; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>SYSTEM LOGIN</h2>
    <input type="password" id="password" placeholder="ENTER KEY">
    <button onclick="checkPassword()">XÁC NHẬN</button>
</div>

<div class="container" id="main-box" style="display:none;">
    <h2>DEVICE VERIFICATION</h2>
    <input type="text" id="inputString" placeholder="ENTER ID STRING">
    <button onclick="checkDevice()">KIỂM TRA</button>
    <div id="message"></div>
</div>

<script>
    function checkPassword() {
        const pass = document.getElementById('password').value;
        if (pass === "ptba-key12") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-box').style.display = 'block';
        } else {
            alert("Truy cập bị từ chối.");
        }
    }

    function checkDevice() {
        const str = document.getElementById('inputString').value;
        const msg = document.getElementById('message');
        
        // Kiểm tra đúng 40 ký tự
        if (str.length === 40) {
            msg.innerHTML = "Duyệt thiết bị thành công! 🚀📱";
            msg.style.color = "#39ff14";
        } else {
            msg.innerHTML = "Không duyệt thiết bị thành công! ❌";
            msg.style.color = "#ff3e3e";
        }
    }
</script>

</body>
